<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>plankit</title>
<meta name="description" content="A workshop for plans. Small tools, carefully made. Home of pk — the plan-driven development toolkit.">
<meta property="og:title" content="plankit">
<meta property="og:description" content="A workshop for plans. Small tools, carefully made.">
<meta property="og:url" content="https://plankit.com">
<meta property="og:type" content="website">
<link rel="canonical" href="https://plankit.com">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #faf8f5;
    --text: #2c2825;
    --muted: #7a726a;
    --accent: #b8510d;
    --rule: #e0dbd5;
    --code-bg: #f0ece7;
    --max-width: 720px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 80px 24px 120px;
  }

  .mark {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  h1 {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 20px;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 64px;
    font-style: italic;
  }

  h2 {
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  p {
    margin-bottom: 20px;
  }

  .section {
    margin-bottom: 56px;
  }

  .links {
    list-style: none;
    margin: 24px 0;
  }

  .links li {
    padding: 20px 0;
    border-bottom: 1px solid var(--rule);
  }

  .links li:first-child {
    border-top: 1px solid var(--rule);
  }

  .links .name {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
  }

  .links .name a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .links .name a:hover {
    color: var(--accent);
  }

  .links .desc {
    font-size: 16px;
    color: var(--muted);
  }

  a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  a:hover {
    border-bottom-color: var(--accent);
  }

  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<main class="page">

  <div class="mark">plankit</div>

  <h1>A workshop for plans.</h1>
  <p class="subtitle">Small tools, carefully made, for people who want to finish what they start.</p>

  <div class="section">
    <ul class="links">
      <li>
        <span class="name"><a href="/pk/">pk</a></span>
        <span class="desc">A plan-driven development toolkit for Claude Code. Free and open source.</span>
      </li>
    </ul>
  </div>

  <div class="footer">
    <a href="/">plankit</a> &middot; <a href="/pk/">pk</a> &middot; <a href="https://github.com/markwharton/plankit">github</a>
  </div>

</main>
</body>
</html>
